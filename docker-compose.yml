services:
  db:
    image: postgres:16-alpine
    container_name: library_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-library}
      POSTGRES_USER: ${POSTGRES_USER:-library_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library_user} -d ${POSTGRES_DB:-library}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: library_web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-library_user}:${POSTGRES_PASSWORD:-library_pass}@db:5432/${POSTGRES_DB:-library}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      UPLOAD_FOLDER: static/uploads
    ports:
      - "8080:8000"
    volumes:
      - uploads:/app/app/static/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
